<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Todo List (localStorage) — Deadline, Priority, Copy, Clickable URLs</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:flex-start;padding:40px;background:#f6f7fb}
    .container{width:700px;background:#fff;padding:18px;border-radius:8px;box-shadow:0 6px 20px rgba(20,30,60,0.08)}
    .header{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    input[type="text"], input[type="date"]{padding:10px;border:1px solid #d8dbe6;border-radius:6px;font-size:14px}
    .add-btn{background:#2563eb;color:#fff;border:none;padding:10px 14px;border-radius:6px;cursor:pointer}
    .todo-list{list-style:none;padding:0;margin:0}
    .todo-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-top:1px solid #eef0f6;border-radius:6px;margin-top:8px}
    .left{display:flex;flex-direction:column;gap:6px;width:65%}
    .title{font-size:15px;color:#0f172a;word-break:break-word}
    .title.completed{text-decoration:line-through;color:#94a3b8}
    .meta{font-size:12px;color:#64748b}
    .right{display:flex;gap:8px;align-items:center}
    button.action{padding:6px 10px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
    .complete{background:#10b981;color:#fff}
    .delete{background:#ef4444;color:#fff}
    .copy{background:#6b7280;color:#fff} /* gray */
    .small-muted{font-size:12px;color:#94a3b8}
    a.task-link{color:#2563eb;text-decoration:underline;word-break:break-all}
    /* urgency colors */
    .urgent-24{background:linear-gradient(90deg, rgba(254,202,202,0.18), rgba(254,202,202,0.05));border-left:4px solid #ef4444}
    .urgent-48{background:linear-gradient(90deg, rgba(255,243,205,0.14), rgba(255,243,205,0.03));border-left:4px solid #f59e0b}
    @media(max-width:640px){.container{width:100%}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <input id="todoInput" type="text" placeholder="Task description (required) — paste an URL to make it clickable" />
      <input id="deadlineInput" type="date" title="Optional deadline" />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <ul id="todoList" class="todo-list"></ul>
    <p class="small-muted" style="margin-top:10px">Rows highlighted red if deadline &lt;24h, orange if &lt;48h. Ordered: red, orange, then others. Tasks persist in localStorage.</p>
  </div>

  <script>
    const STORAGE_KEY = 'todo_app_tasks_v1'
    const todoInput = document.getElementById('todoInput')
    const deadlineInput = document.getElementById('deadlineInput')
    const todoList = document.getElementById('todoList')
    let todos = loadTodos()

    function saveTodos() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos))
      } catch (e) {
        console.error('Failed to save todos', e)
      }
    }

    function loadTodos() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY)
        if (!raw) return []
        const parsed = JSON.parse(raw)
        if (!Array.isArray(parsed)) return []
        return parsed
      } catch (e) {
        console.error('Failed to load todos', e)
        return []
      }
    }

    function formatDateISOToLocal(iso) {
      if (!iso) return ''
      const d = new Date(iso + 'T00:00:00')
      if (isNaN(d)) return iso
      return d.toLocaleDateString()
    }

    function todayLocaleDate() {
      return new Date().toLocaleDateString()
    }

    function addTodo() {
      const text = todoInput.value.trim()
      if (!text) return
      const deadlineValue = deadlineInput.value || null
      todos.push({
        text,
        completed: false,
        added: todayLocaleDate(),
        deadline: deadlineValue // yyyy-mm-dd or null
      })
      todoInput.value = ''
      deadlineInput.value = ''
      saveTodos()
      render()
    }

    function toggleComplete(i) {
      todos[i].completed = !todos[i].completed
      saveTodos()
      render()
    }

    function deleteTodo(i) {
      todos.splice(i,1)
      saveTodos()
      render()
    }

    function copyTaskToClipboard(i) {
      const t = todos[i]
      const parts = [`${t.text}`]
      if (t.deadline) parts.push(`Deadline: ${formatDateISOToLocal(t.deadline)}`)
      parts.push(`Added: ${t.added}`)
      const textToCopy = parts.join(' | ')
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy).catch(()=>fallbackCopy(textToCopy))
      } else {
        fallbackCopy(textToCopy)
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea')
      ta.value = text
      ta.style.position = 'fixed'
      ta.style.left = '-9999px'
      document.body.appendChild(ta)
      ta.select()
      try { document.execCommand('copy') } catch(e){}
      document.body.removeChild(ta)
    }

    function urgencyRank(deadlineIso) {
      if (!deadlineIso) return 3
      const dl = new Date(deadlineIso + 'T00:00:00')
      const now = new Date()
      const diffHours = (dl.getTime() - now.getTime()) / (1000*60*60)
      if (diffHours < 0) return 1
      if (diffHours <= 24) return 1
      if (diffHours <= 48) return 2
      return 3
    }

    function getUrgencyClass(deadlineIso) {
      const rank = urgencyRank(deadlineIso)
      if (rank === 1) return 'urgent-24'
      if (rank === 2) return 'urgent-48'
      return ''
    }

    // create nodes with clickable links for URLs
    function createTextWithLinks(text) {
      const urlRegex = /((https?:\/\/|www\.)[^\s<>"]+[^\s<>".,;:!?])/gi
      const frag = document.createDocumentFragment()
      let lastIndex = 0
      let m
      while ((m = urlRegex.exec(text)) !== null) {
        const idx = m.index
        if (idx > lastIndex) {
          frag.appendChild(document.createTextNode(text.slice(lastIndex, idx)))
        }
        let url = m[0]
        if (!/^https?:\/\//i.test(url)) url = 'http://' + url
        const a = document.createElement('a')
        a.href = url
        a.target = '_blank'
        a.rel = 'noopener noreferrer'
        a.className = 'task-link'
        a.textContent = m[0]
        frag.appendChild(a)
        lastIndex = idx + m[0].length
      }
      if (lastIndex < text.length) {
        frag.appendChild(document.createTextNode(text.slice(lastIndex)))
      }
      if (!frag.childNodes.length) return document.createTextNode(text)
      return frag
    }

    function render() {
      todoList.innerHTML = ''
      const indexed = todos.map((t,i)=>({t,i,rank:urgencyRank(t.deadline)}))
      indexed.sort((a,b)=>{
        if (a.rank !== b.rank) return a.rank - b.rank
        return a.i - b.i
      })
      indexed.forEach(({t, i}) => {
        const li = document.createElement('li')
        li.className = 'todo-item ' + getUrgencyClass(t.deadline)

        const left = document.createElement('div')
        left.className = 'left'

        const title = document.createElement('div')
        title.className = 'title' + (t.completed ? ' completed' : '')
        title.appendChild(createTextWithLinks(t.text))

        const meta = document.createElement('div')
        meta.className = 'meta'
        const added = document.createElement('span')
        added.textContent = 'Added: ' + t.added
        meta.appendChild(added)

        if (t.deadline) {
          const sep = document.createElement('span')
          sep.textContent = ' — '
          const dl = document.createElement('span')
          dl.textContent = 'Deadline: ' + formatDateISOToLocal(t.deadline)
          dl.style.marginLeft = '6px'
          meta.appendChild(sep)
          meta.appendChild(dl)
        }

        left.appendChild(title)
        left.appendChild(meta)

        const right = document.createElement('div')
        right.className = 'right'

        const completeBtn = document.createElement('button')
        completeBtn.className = 'action complete'
        completeBtn.textContent = t.completed ? 'Undo' : 'Complete'
        completeBtn.onclick = () => toggleComplete(i)

        const copyBtn = document.createElement('button')
        copyBtn.className = 'action copy'
        copyBtn.textContent = 'Copy'
        copyBtn.onclick = () => copyTaskToClipboard(i)

        const deleteBtn = document.createElement('button')
        deleteBtn.className = 'action delete'
        deleteBtn.textContent = 'Delete'
        deleteBtn.onclick = () => deleteTodo(i)

        right.appendChild(completeBtn)
        right.appendChild(copyBtn)
        right.appendChild(deleteBtn)

        li.appendChild(left)
        li.appendChild(right)
        todoList.appendChild(li)
      })
    }

    // initial render
    render()
  </script>
</body>
</html>
