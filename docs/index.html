<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Agile Board</title>
    <style>
        /* --- Modern CSS Variables --- */
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-column: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --noise: #f59e0b;
            --noise-hover: #d97706;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 8px;
            --radius-lg: 12px;
            --locked-bg: #fef2f2;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.5; }

        /* --- Header & Controls --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
        h1 { margin: 0; font-size: 1.75rem; font-weight: 700; color: #1e293b; letter-spacing: -0.025em; }
        
        .header-actions { display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-outline { background: transparent; border: 1px solid var(--border-light); color: var(--text-main); }
        .btn-outline:hover { background: var(--bg-column); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }

        /* --- Creator Bar --- */
        .creator-bar { background: var(--bg-surface); padding: 16px; border-radius: var(--radius-lg); margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); align-items: center; }
        .input-base { padding: 10px 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md); font-size: 0.875rem; outline: none; transition: border-color 0.2s; background: var(--bg-body); }
        .input-base:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        #new-card-text { flex-grow: 1; min-width: 200px; }
        .btn-task { background: var(--primary); color: white; }
        .btn-task:hover { background: var(--primary-hover); }
        .btn-noise { background: var(--noise); color: white; }
        .btn-noise:hover { background: var(--noise-hover); }

        /* --- Board Layout --- */
        .workflow-row { background: transparent; margin-bottom: 32px; }
        .workflow-row h2 { margin-top: 0; font-size: 1.25rem; font-weight: 600; color: var(--text-main); margin-bottom: 16px; }
        .columns-container { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
        
        .column { background: var(--bg-column); border-radius: var(--radius-lg); min-width: 300px; flex: 1; padding: 16px; display: flex; flex-direction: column; border: 1px solid var(--border-light); }
        .column h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin: 0 0 16px 0; letter-spacing: 0.05em; display: flex; justify-content: space-between; }
        .card-list { flex-grow: 1; min-height: 150px; display: flex; flex-direction: column; gap: 12px; }

        /* --- Modern Card Styling --- */
        .card { background: var(--bg-surface); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-sm); cursor: grab; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid var(--border-light); border-left: 4px solid #cbd5e1; position: relative; }
        .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .task-card { border-left-color: var(--primary); }
        .noise-card { border-left-color: var(--noise); }
        .card.is-locked { background-color: var(--locked-bg); cursor: not-allowed; border-left-color: var(--danger); border-left-style: dashed; }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
        .card-title { font-weight: 600; font-size: 0.95rem; line-height: 1.3; color: var(--text-main); word-break: break-word; }
        
        /* Card Meta (Priority & Date) */
        .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; font-size: 0.75rem; font-weight: 500; }
        .badge { padding: 2px 8px; border-radius: 999px; background: var(--bg-column); color: var(--text-muted); }
        .badge.prio-high { background: #fee2e2; color: #b91c1c; }
        .badge.prio-medium { background: #fef3c7; color: #b45309; }
        .badge.prio-low { background: #e0f2fe; color: #0369a1; }
        .badge.overdue { background: var(--danger); color: white; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Icons & Actions */
        .lock-icon { cursor: pointer; font-size: 1.1rem; user-select: none; margin-right: 6px; }
        .delete-btn { cursor: pointer; color: #94a3b8; font-size: 1.2rem; line-height: 1; transition: color 0.2s; background: none; border: none; padding: 0; }
        .delete-btn:hover { color: var(--danger); }

        /* History & Inputs */
        .history-section { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .history-item { font-size: 0.8rem; background: var(--bg-column); padding: 8px; border-radius: 6px; color: var(--text-main); }
        .history-stage-tag { font-weight: 700; font-size: 0.65rem; color: var(--primary); text-transform: uppercase; margin-bottom: 2px; display: block; }
        .media-content img { width: 100%; border-radius: 4px; margin-top: 6px; }
        .media-content a { color: var(--primary); text-decoration: none; font-weight: 600; }
        
        .card-input-wrapper input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid var(--border-light); border-radius: 6px; font-size: 0.8rem; outline: none; background: #f8fafc; transition: all 0.2s; }
        .card-input-wrapper input:focus { background: white; border-color: var(--primary); }

        /* System Log */
        .log-section { background: #0f172a; color: #f8fafc; padding: 20px; border-radius: var(--radius-lg); height: 200px; display: flex; flex-direction: column; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .log-section h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #334155; padding-bottom: 12px; color: #cbd5e1; }
        #event-log { flex-grow: 1; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.85rem; line-height: 1.6; }
        .log-time { color: var(--success); margin-right: 8px; }
        .log-err { color: #f87171; }
        .drag-over { background: #e2e8f0; border: 2px dashed var(--primary); }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Modern Agile Board</h1>
        <div class="header-actions">
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
            
            <button class="btn btn-outline" onclick="triggerImport()">📥 Import</button>
            <button class="btn btn-outline" onclick="exportData()">📤 Export</button>
            <button class="btn btn-danger" onclick="clearBoard()">🗑️ Reset</button>
        </div>
    </div>

    <div class="creator-bar">
        <input type="text" id="new-card-text" class="input-base" placeholder="What needs to be done?">
        
        <select id="new-card-priority" class="input-base">
            <option value="Low">⏬ Low Priority</option>
            <option value="Medium" selected>⏸️ Medium Priority</option>
            <option value="High">⏫ High Priority</option>
        </select>
        
        <input type="date" id="new-card-date" class="input-base" title="Set Due Date">
        
        <button class="btn btn-task" onclick="createNewCard('task')">➕ Add Task</button>
        <button class="btn btn-noise" onclick="createNewCard('noise')">➕ Add Noise</button>
    </div>

    <div class="workflow-row">
        <h2>Task Pipeline</h2>
        <div class="columns-container">
            <div class="column" id="task-backlog" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Backlog</h3><div class="card-list"></div></div>
            <div class="column" id="refinement" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Refinement</h3><div class="card-list"></div></div>
            <div class="column" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Doing</h3><div class="card-list"></div></div>
            <div class="column" id="blocked" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Blocked</h3><div class="card-list"></div></div>
            <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Done</h3><div class="card-list"></div></div>
        </div>
    </div>

    <div class="workflow-row">
        <h2>External Noise Tracking</h2>
        <div class="columns-container">
            <div class="column" id="noise-backlog" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Noise Backlog</h3><div class="card-list"></div></div>
            <div class="column" id="wait" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Wait</h3><div class="card-list"></div></div>
            <div class="column" id="coincidence" ondrop="drop(event)" ondragover="allowDrop(event)"><h3>Coincidence</h3><div class="card-list"></div></div>
        </div>
    </div>

    <div class="log-section">
        <h3>System Diagnostics & Log</h3>
        <div id="event-log"></div>
    </div>

    <script>
        // --- 1. STATE MANAGEMENT ---
        let boardData = JSON.parse(localStorage.getItem('modernScrumBoard')) || { cards: [], logs: [] };
        const priorityWeights = { 'High': 3, 'Medium': 2, 'Low': 1 };

        // Helper: Check if a date string is strictly in the past
        function isOverdue(dateString) {
            if (!dateString) return false;
            const today = new Date();
            today.setHours(0,0,0,0); // Normalize today to midnight
            const dueDate = new Date(dateString);
            dueDate.setHours(0,0,0,0);
            return dueDate < today;
        }

        // --- 2. CORE RENDERER ---
        function render() {
            document.querySelectorAll('.card-list').forEach(list => list.innerHTML = '');
            
            // SORTING LOGIC: Sort cards by priority (Highest first) before rendering
            const sortedCards = [...boardData.cards].sort((a, b) => {
                const weightA = priorityWeights[a.priority] || 0;
                const weightB = priorityWeights[b.priority] || 0;
                return weightB - weightA; // Descending
            });

            sortedCards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.id = card.id;
                cardEl.className = `card ${card.type}-card ${card.locked ? 'is-locked' : ''}`;
                cardEl.draggable = !card.locked; 
                cardEl.ondragstart = (e) => e.dataTransfer.setData("cardId", card.id);

                // Meta Badges (Priority & Date)
                let metaHtml = '';
                if(card.priority) {
                    metaHtml += `<span class="badge prio-${card.priority.toLowerCase()}">${card.priority}</span>`;
                }
                if(card.dueDate) {
                    const overdueClass = isOverdue(card.dueDate) && card.column !== 'done' && card.column !== 'coincidence' ? 'overdue' : '';
                    metaHtml += `<span class="badge ${overdueClass}">📅 ${card.dueDate}</span>`;
                }

                // History Assembly
                let historyHtml = '';
                Object.keys(card.stageComments).forEach(stage => {
                    const content = card.stageComments[stage];
                    let mediaHtml = content.match(/\.(jpeg|jpg|gif|png|webp)$/i) ? `<img src="${content}">` : 
                                    content.startsWith('http') ? `<a href="${content}" target="_blank">🔗 Link</a>` : `<span>${content}</span>`;
                    historyHtml += `<div class="history-item"><span class="history-stage-tag">${stage.replace('-', ' ')}</span><div class="media-content">${mediaHtml}</div></div>`;
                });

                // Lock Icon
                const lockIcon = card.column === 'blocked' ? 
                    `<span class="lock-icon" onclick="toggleLock('${card.id}')" title="Unlock">${card.locked ? '🔒' : '🔓'}</span>` : '';

                cardEl.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">
                            ${lockIcon} ${card.text}
                        </div>
                        <button class="delete-btn" onclick="deleteCard('${card.id}')" title="Delete">×</button>
                    </div>
                    ${metaHtml ? `<div class="card-meta">${metaHtml}</div>` : ''}
                    <div class="history-section">${historyHtml}</div>
                    <div class="card-input-wrapper">
                        <input type="text" placeholder="Add note to ${card.column.replace('-', ' ')}..." 
                               onkeydown="saveComment(event, '${card.id}', '${card.column}')">
                    </div>
                `;
                
                const columnList = document.getElementById(card.column).querySelector('.card-list');
                columnList.appendChild(cardEl);
            });

            // Logs
            const logEl = document.getElementById('event-log');
            logEl.innerHTML = boardData.logs.map(l => `<div>${l}</div>`).reverse().join('');
            localStorage.setItem('modernScrumBoard', JSON.stringify(boardData));
        }

        // --- 3. ACTIONS ---
        function createNewCard(type) {
            const input = document.getElementById('new-card-text');
            const priorityInput = document.getElementById('new-card-priority');
            const dateInput = document.getElementById('new-card-date');
            
            if (!input.value.trim()) return alert("Please enter a title");
            
            boardData.cards.push({
                id: 'id-' + Date.now(),
                type: type,
                text: input.value,
                priority: priorityInput.value,
                dueDate: dateInput.value, // "YYYY-MM-DD" or ""
                column: type === 'task' ? 'task-backlog' : 'noise-backlog',
                stageComments: {},
                locked: false
            });
            
            log(`Created ${type.toUpperCase()}: "${input.value}" [${priorityInput.value}]`);
            input.value = '';
            dateInput.value = ''; // Reset date
            render();
        }

        function toggleLock(id) {
            const card = boardData.cards.find(c => c.id === id);
            card.locked = !card.locked;
            log(`${card.locked ? 'LOCKED 🔒' : 'UNLOCKED 🔓'} card`);
            render();
        }

        function saveComment(e, cardId, stageId) {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const card = boardData.cards.find(c => c.id === cardId);
                card.stageComments[stageId] = (card.stageComments[stageId] ? card.stageComments[stageId] + " | " : "") + e.target.value;
                log(`Note updated in ${stageId}`);
                render();
            }
        }

        function deleteCard(id) {
            if(confirm(`Delete this card?`)) {
                boardData.cards = boardData.cards.filter(c => c.id !== id);
                log(`Deleted card`);
                render();
            }
        }

        function clearBoard() {
            if(confirm("Wipe the entire board and logs?")) {
                localStorage.removeItem('modernScrumBoard');
                location.reload();
            }
        }

        function log(msg, isError = false) {
            const time = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span>`;
            const content = isError ? `<span class="log-err">${msg}</span>` : msg;
            boardData.logs.push(`${time} ${content}`);
        }

        // --- 4. IMPORT / EXPORT JSON ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(boardData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            // Format file name with today's date
            const dateStr = new Date().toISOString().split('T')[0];
            downloadAnchorNode.setAttribute("download", `agile_board_backup_${dateStr}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            log("Exported JSON backup.");
        }

        function triggerImport() { document.getElementById('import-file').click(); }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    // Basic validation to ensure it's a board object
                    if (importedData && Array.isArray(importedData.cards)) {
                        boardData = importedData;
                        log("Imported JSON successfully.");
                        render();
                    } else {
                        alert("The JSON file is missing the required 'cards' array.");
                    }
                } catch(err) {
                    alert("Invalid JSON format.");
                }
            };
            reader.readAsText(file);
            // Reset input so you can import the same file again if needed
            event.target.value = ""; 
        }

        // --- 5. DRAG AND DROP ---
        function allowDrop(e) { 
            e.preventDefault(); 
            e.currentTarget.classList.add('drag-over');
        }
        
        document.querySelectorAll('.column').forEach(col => {
            col.addEventListener('dragleave', (e) => e.currentTarget.classList.remove('drag-over'));
            col.addEventListener('drop', (e) => e.currentTarget.classList.remove('drag-over'));
        });

        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            const targetColId = e.currentTarget.id;
            const cardId = e.dataTransfer.getData("cardId");
            const card = boardData.cards.find(c => c.id === cardId);
            
            if (!card) return;
            if (card.locked) { log(`DENIED: Card is locked!`, true); return; }

            const sourceColId = card.column;
            let allowed = false;

            if (card.type === 'task') {
                if (sourceColId === 'task-backlog' && ['refinement', 'doing', 'done'].includes(targetColId)) allowed = true;
                if (sourceColId === 'refinement' && targetColId === 'doing') allowed = true;
                if (sourceColId === 'doing' && ['done', 'blocked'].includes(targetColId)) allowed = true;
                if (sourceColId === 'blocked' && ['doing', 'done'].includes(targetColId)) allowed = true;
            } else {
                if (sourceColId === 'noise-backlog' && ['wait', 'coincidence'].includes(targetColId)) allowed = true;
                if (sourceColId === 'wait' && targetColId === 'coincidence') allowed = true;
            }

            if (sourceColId === targetColId) allowed = true; 

            if (allowed) {
                card.column = targetColId;
                if (targetColId === 'blocked' && sourceColId !== 'blocked') {
                    card.locked = true;
                    log(`Moved to Blocked. Card auto-locked.`);
                } else if (sourceColId !== targetColId) {
                    log(`Moved card: ${sourceColId} → ${targetColId}`);
                }
            } else {
                log(`INVALID MOVE: ${sourceColId} → ${targetColId}`, true);
            }
            render();
        }

        // Init
        if(boardData.logs.length === 0) log("Modern System Initialized.");
        render();
    </script>
</body>
</html>
