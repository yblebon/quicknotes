<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<meta name="description" content="Industrial agile board for task and noise management">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agile Board">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Agile Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;--paper:#f5f2eb;--paper2:#ede9df;--paper3:#e2ddd0;
  --amber:#c17f24;--amber2:#8c5a12;--amber-light:#faeeda;
  --red:#a32d2d;--red-light:#fcebeb;
  --green:#3b6d11;--green-light:#eaf3de;
  --blue:#185fa5;--blue-light:#e6f1fb;
  --border:#c4bfb0;--border2:#9e9a8e;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}

html,body{height:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:14px;
  padding:20px;line-height:1.5;
  min-height:100vh;
}

/* ── Header ── */
.board-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:2px solid var(--ink);
  flex-wrap:wrap;gap:12px;
}
.board-title{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1}
.board-title span{
  display:block;font-size:11px;font-weight:400;
  color:var(--border2);margin-top:4px;
  letter-spacing:0.08em;text-transform:uppercase;
}
.header-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ── Buttons ── */
.btn{
  font-family:var(--mono);font-size:11px;font-weight:500;
  padding:6px 12px;border:1px solid var(--border);
  background:var(--paper2);color:var(--ink);
  cursor:pointer;letter-spacing:0.04em;
  transition:all 0.15s;white-space:nowrap;
}
.btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn:active{opacity:0.8}
.btn-amber{border-color:var(--amber);color:var(--amber2);background:var(--amber-light)}
.btn-amber:hover{background:var(--amber);color:var(--paper);border-color:var(--amber2)}
.btn-red{border-color:var(--red);color:var(--red);background:var(--red-light)}
.btn-red:hover{background:var(--red);color:var(--paper);border-color:var(--red)}

/* PWA install button (hidden until prompt fires) */
#install-btn{display:none}

/* ── Creator Bar ── */
.creator-bar{
  background:var(--paper2);border:1px solid var(--border);
  padding:14px;margin-bottom:20px;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
}
.creator-bar::before{
  content:'> NEW ITEM';font-family:var(--mono);font-size:10px;
  color:var(--border2);letter-spacing:0.1em;width:100%;
  display:block;margin-bottom:4px;
}
input[type=text],input[type=date],select,textarea{
  font-family:var(--mono);font-size:12px;
  padding:7px 10px;border:1px solid var(--border);
  background:var(--paper);color:var(--ink);
  outline:none;flex:1;min-width:160px;
  -webkit-appearance:none;
}
input[type=text]:focus,input[type=date]:focus,
select:focus,textarea:focus{
  border-color:var(--ink);background:#fff;
}
select{min-width:140px;flex:0;cursor:pointer}
input[type=file]{display:none}

/* ── Section Labels ── */
.section-label{
  font-family:var(--mono);font-size:10px;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--border2);margin-bottom:10px;
  padding-left:2px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Columns ── */
.cols{
  display:flex;gap:10px;overflow-x:auto;
  padding-bottom:6px;margin-bottom:24px;
}
.col{
  background:var(--paper2);border:1px solid var(--border);
  min-width:210px;flex:1;display:flex;flex-direction:column;
}
.col-head{
  font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:8px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--paper3);user-select:none;
}
.col-count{
  background:var(--ink);color:var(--paper);
  font-size:9px;padding:2px 6px;min-width:18px;text-align:center;
}
.col-body{
  flex:1;min-height:120px;padding:8px;
  display:flex;flex-direction:column;gap:8px;
}
.col.drag-over{border:1.5px dashed var(--amber);background:var(--amber-light)}

/* ── Cards ── */
.card{
  background:var(--paper);border:1px solid var(--border);
  padding:12px;cursor:grab;
  transition:transform 0.15s,box-shadow 0.15s;
  position:relative;border-left:3px solid var(--border2);
}
.card:hover{box-shadow:3px 3px 0 var(--border);transform:translate(-1px,-1px)}
.card:active{cursor:grabbing}
.card.task-card{border-left-color:var(--blue)}
.card.noise-card{border-left-color:var(--amber)}
.card.is-locked{
  border-left-color:var(--red);border-left-style:dashed;
  background:var(--red-light);cursor:not-allowed;opacity:0.85;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:500;line-height:1.35;word-break:break-word}
.del-btn{
  background:none;border:none;cursor:pointer;
  color:var(--border2);font-size:16px;line-height:1;
  padding:0;flex-shrink:0;transition:color 0.15s;
}
.del-btn:hover{color:var(--red)}
.lock-btn{cursor:pointer;font-family:var(--mono);font-size:10px;margin-right:4px;color:var(--red)}

/* ── Badges ── */
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.badge{
  font-family:var(--mono);font-size:10px;
  padding:2px 6px;border:1px solid;letter-spacing:0.03em;
}
.badge-blue{background:var(--blue-light);color:#0c447c;border-color:#b5d4f4}
.badge-amber{background:var(--amber-light);color:#633806;border-color:#fac775}
.badge-green{background:var(--green-light);color:#27500a;border-color:#c0dd97}
.badge-red{background:var(--red-light);color:#791f1f;border-color:#f7c1c1;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

/* ── History ── */
.history{max-height:100px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.hist-item{
  font-family:var(--mono);font-size:10px;
  background:var(--paper3);padding:5px 7px;
  border-left:2px solid var(--border2);
}
.hist-stage{
  display:block;color:var(--amber2);font-size:9px;
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1px;
}
.hist-link{color:var(--blue);text-decoration:none}
.hist-link:hover{text-decoration:underline}
.hist-img{width:100%;margin-top:4px;border:1px solid var(--border)}
.card-note{
  width:100%;font-family:var(--mono);font-size:11px;
  padding:5px 8px;border:1px solid var(--border);
  background:var(--paper2);color:var(--ink);outline:none;
}
.card-note:focus{border-color:var(--amber);background:#fff}

/* ── System Log ── */
.log-box{
  background:var(--ink);color:#c8c2b0;
  font-family:var(--mono);font-size:11px;
  padding:14px;margin-top:8px;
}
.log-box-head{
  font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  color:#666;border-bottom:1px solid #333;
  padding-bottom:8px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
}
.log-scroll{height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.log-time{color:#c17f24;margin-right:6px}
.log-err{color:#f09595}
.log-ok{color:#97c459}

/* ── PWA Offline Banner ── */
#offline-banner{
  display:none;background:var(--amber);color:var(--paper);
  font-family:var(--mono);font-size:11px;padding:6px 14px;
  text-align:center;letter-spacing:0.05em;
  position:sticky;top:0;z-index:100;
}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── Mobile ── */
@media(max-width:600px){
  body{padding:12px}
  .board-title{font-size:18px}
  .cols{flex-direction:column;overflow-x:visible}
  .col{min-width:unset}
}
</style>
</head>
<body>

<div id="offline-banner">[ OFFLINE MODE — changes saved locally ]</div>

<div class="board-header">
  <div class="board-title">
    AGILE BOARD
    <span>task &amp; noise management system</span>
  </div>
  <div class="header-btns">
    <button id="install-btn" class="btn btn-amber" onclick="installPWA()">[ INSTALL APP ]</button>
    <input type="file" id="import-file" accept=".json" onchange="importData(event)">
    <button class="btn" onclick="document.getElementById('import-file').click()">[ IMPORT ]</button>
    <button class="btn" onclick="exportData()">[ EXPORT ]</button>
    <button class="btn btn-red" onclick="clearBoard()">[ RESET ]</button>
  </div>
</div>

<div class="creator-bar">
  <input type="text" id="new-card-text" placeholder="describe the task or noise item...">
  <select id="new-card-priority">
    <option value="Low">LOW</option>
    <option value="Medium" selected>MEDIUM</option>
    <option value="High">HIGH</option>
  </select>
  <input type="date" id="new-card-date">
  <button class="btn btn-amber" onclick="createCard('task')">+ TASK</button>
  <button class="btn" onclick="createCard('noise')">+ NOISE</button>
</div>

<div class="section-label">task pipeline</div>
<div class="cols">
  <div class="col" id="task-backlog" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">backlog <span class="col-count" id="cnt-task-backlog">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" id="refinement" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">refinement <span class="col-count" id="cnt-refinement">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">doing <span class="col-count" id="cnt-doing">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" id="blocked" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">blocked <span class="col-count" id="cnt-blocked">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" id="done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">done <span class="col-count" id="cnt-done">0</span></div>
    <div class="col-body"></div>
  </div>
</div>

<div class="section-label">external noise tracking</div>
<div class="cols">
  <div class="col" id="noise-backlog" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">noise backlog <span class="col-count" id="cnt-noise-backlog">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" id="wait" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">wait <span class="col-count" id="cnt-wait">0</span></div>
    <div class="col-body"></div>
  </div>
  <div class="col" id="coincidence" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <div class="col-head">coincidence <span class="col-count" id="cnt-coincidence">0</span></div>
    <div class="col-body"></div>
  </div>
</div>

<div class="log-box">
  <div class="log-box-head">
    <span>system diagnostics</span>
    <button class="btn" style="font-size:9px;padding:3px 8px" onclick="clearLogs()">[ CLEAR LOG ]</button>
  </div>
  <div class="log-scroll" id="event-log"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let boardData = JSON.parse(localStorage.getItem('agileBoardPWA')) || { cards:[], logs:[] };
const priW = { High:3, Medium:2, Low:1 };

function isOverdue(d) {
  if (!d) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  return dd < t;
}

// ── Render ─────────────────────────────────────────────────────────────
function render() {
  document.querySelectorAll('.col-body').forEach(b => b.innerHTML = '');
  const counts = {};
  document.querySelectorAll('[id^=cnt-]').forEach(el => counts[el.id.replace('cnt-','')] = 0);

  [...boardData.cards]
    .sort((a,b) => (priW[b.priority]||0) - (priW[a.priority]||0))
    .forEach(card => {
      const el = document.createElement('div');
      el.id = card.id;
      el.className = `card ${card.type}-card ${card.locked ? 'is-locked' : ''}`;
      el.draggable = !card.locked;
      el.ondragstart = e => e.dataTransfer.setData('cardId', card.id);

      // Touch drag support
      el.addEventListener('touchstart', touchStart, {passive:true});
      el.addEventListener('touchmove', touchMove, {passive:false});
      el.addEventListener('touchend', touchEnd, {passive:true});

      let badges = '';
      if (card.priority) {
        const cls = card.priority==='High' ? 'badge-red' : card.priority==='Medium' ? 'badge-amber' : 'badge-blue';
        badges += `<span class="badge ${cls}">${card.priority.toUpperCase()}</span>`;
      }
      if (card.dueDate) {
        const ov = isOverdue(card.dueDate) && card.column !== 'done' && card.column !== 'coincidence';
        badges += `<span class="badge ${ov ? 'badge-red' : 'badge-green'}">${card.dueDate}</span>`;
      }
      const typeLabel = card.type === 'task' ? 'badge-blue' : 'badge-amber';
      badges += `<span class="badge ${typeLabel}">${card.type.toUpperCase()}</span>`;

      let hist = '';
      Object.entries(card.stageComments || {}).forEach(([stage, content]) => {
        let inner = /\.(jpeg|jpg|gif|png|webp)$/i.test(content)
          ? `<img class="hist-img" src="${content}" alt="attachment">`
          : content.startsWith('http')
            ? `<a class="hist-link" href="${content}" target="_blank" rel="noopener">link ↗</a>`
            : content;
        hist += `<div class="hist-item"><span class="hist-stage">${stage.replace(/-/g,' ')}</span>${inner}</div>`;
      });

      const lockBtn = card.column === 'blocked'
        ? `<span class="lock-btn" onclick="toggleLock('${card.id}')" title="${card.locked?'unlock':'lock'}">[${card.locked?'LCK':'ULK'}]</span>`
        : '';

      el.innerHTML = `
        <div class="card-top">
          <div class="card-title">${lockBtn}${escHtml(card.text)}</div>
          <button class="del-btn" onclick="deleteCard('${card.id}')" title="delete">×</button>
        </div>
        ${badges ? `<div class="badges">${badges}</div>` : ''}
        ${hist ? `<div class="history">${hist}</div>` : ''}
        <input class="card-note" type="text"
          placeholder="// note for ${card.column.replace(/-/g,' ')}..."
          onkeydown="saveNote(event,'${card.id}','${card.column}')">
      `;

      const colEl = document.getElementById(card.column);
      if (colEl) {
        colEl.querySelector('.col-body').appendChild(el);
        if (counts[card.column] !== undefined) counts[card.column]++;
      }
    });

  Object.entries(counts).forEach(([id, n]) => {
    const el = document.getElementById('cnt-' + id);
    if (el) el.textContent = n;
  });

  const logEl = document.getElementById('event-log');
  logEl.innerHTML = [...boardData.logs].reverse().map(l => `<div>${l}</div>`).join('');
  save();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ────────────────────────────────────────────────────────────
function createCard(type) {
  const txt = document.getElementById('new-card-text');
  const pri = document.getElementById('new-card-priority');
  const date = document.getElementById('new-card-date');
  if (!txt.value.trim()) { alert('enter a title'); return; }
  boardData.cards.push({
    id: 'c' + Date.now(),
    type, text: txt.value.trim(),
    priority: pri.value,
    dueDate: date.value,
    column: type === 'task' ? 'task-backlog' : 'noise-backlog',
    stageComments: {},
    locked: false
  });
  log(`created ${type}: "${txt.value.trim()}" [${pri.value}]`);
  txt.value = ''; date.value = '';
  render();
}

function toggleLock(id) {
  const c = boardData.cards.find(c => c.id === id);
  if (!c) return;
  c.locked = !c.locked;
  log(`card ${c.locked ? 'locked' : 'unlocked'}: ${c.text.substring(0,30)}`);
  render();
}

function saveNote(e, id, stage) {
  if (e.key === 'Enter' && e.target.value.trim()) {
    const c = boardData.cards.find(c => c.id === id);
    if (!c) return;
    c.stageComments[stage] = (c.stageComments[stage] ? c.stageComments[stage] + ' | ' : '') + e.target.value.trim();
    log(`note saved in ${stage}`);
    render();
  }
}

function deleteCard(id) {
  if (confirm('delete this card?')) {
    boardData.cards = boardData.cards.filter(c => c.id !== id);
    log('card deleted');
    render();
  }
}

function clearBoard() {
  if (confirm('wipe the entire board and logs?')) {
    localStorage.removeItem('agileBoardPWA');
    location.reload();
  }
}

function clearLogs() {
  boardData.logs = [];
  log('log cleared');
  render();
}

function save() {
  localStorage.setItem('agileBoardPWA', JSON.stringify(boardData));
}

function log(msg, err = false) {
  const t = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span>`;
  const c = err ? `<span class="log-err">${msg}</span>` : msg;
  boardData.logs.push(`${t} ${c}`);
  if (boardData.logs.length > 200) boardData.logs = boardData.logs.slice(-200);
}

// ── Import / Export ────────────────────────────────────────────────────
function exportData() {
  const s = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(boardData, null, 2));
  const a = document.createElement('a');
  a.href = s;
  a.download = `agile_board_${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  log('exported json backup');
}

function importData(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d && Array.isArray(d.cards)) {
        boardData = d;
        log(`imported: ${d.cards.length} cards`);
        render();
      } else {
        alert('invalid board json: missing cards array');
      }
    } catch { alert('invalid json format'); }
  };
  r.readAsText(f);
  e.target.value = '';
}

// ── Drag and Drop ──────────────────────────────────────────────────────
function allowDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function drop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const cardId = e.dataTransfer.getData('cardId');
  moveCard(cardId, e.currentTarget.id);
}

function moveCard(cardId, targetColId) {
  const card = boardData.cards.find(c => c.id === cardId);
  if (!card) return;
  if (card.locked) { log('denied: card is locked', true); render(); return; }

  const src = card.column, tgt = targetColId;
  let ok = false;

  if (card.type === 'task') {
    if (src === 'task-backlog' && ['refinement','doing','done'].includes(tgt)) ok = true;
    if (src === 'refinement' && tgt === 'doing') ok = true;
    if (src === 'doing' && ['done','blocked'].includes(tgt)) ok = true;
    if (src === 'blocked' && ['doing','done'].includes(tgt)) ok = true;
  } else {
    if (src === 'noise-backlog' && ['wait','coincidence'].includes(tgt)) ok = true;
    if (src === 'wait' && tgt === 'coincidence') ok = true;
  }
  if (src === tgt) ok = true;

  if (ok) {
    card.column = tgt;
    if (tgt === 'blocked' && src !== 'blocked') {
      card.locked = true;
      log('moved to blocked — auto-locked');
    } else if (src !== tgt) {
      log(`moved: ${src} → ${tgt}`);
    }
  } else {
    log(`invalid move: ${src} → ${tgt}`, true);
  }
  render();
}

// ── Touch Drag ─────────────────────────────────────────────────────────
let touchDragging = null, touchClone = null;

function touchStart(e) {
  const card = e.currentTarget;
  if (card.classList.contains('is-locked')) return;
  touchDragging = card.id;
  touchClone = card.cloneNode(true);
  touchClone.style.cssText = `
    position:fixed;opacity:0.85;pointer-events:none;z-index:9999;
    width:${card.offsetWidth}px;transform:scale(0.97);
    border:1.5px dashed var(--amber);
  `;
  document.body.appendChild(touchClone);
}

function touchMove(e) {
  if (!touchDragging || !touchClone) return;
  e.preventDefault();
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - touchClone.offsetWidth / 2) + 'px';
  touchClone.style.top  = (t.clientY - 20) + 'px';
  document.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const col = el ? el.closest('.col') : null;
  if (col) col.classList.add('drag-over');
}

function touchEnd(e) {
  if (!touchDragging) return;
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'));
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const col = el ? el.closest('.col') : null;
  if (col) moveCard(touchDragging, col.id);
  touchDragging = null;
}

// ── PWA Install ────────────────────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'inline-flex';
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => {
    log(r.outcome === 'accepted' ? 'app installed successfully' : 'install dismissed');
    deferredPrompt = null;
    document.getElementById('install-btn').style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  log('pwa installed on device');
});

// ── Offline detection ──────────────────────────────────────────────────
function updateOnlineStatus() {
  document.getElementById('offline-banner').style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ── Service Worker Registration ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => log(`service worker registered (scope: ${reg.scope})`))
      .catch(err => log(`service worker error: ${err.message}`, true));
  });
}

// ── Init ───────────────────────────────────────────────────────────────
if (boardData.logs.length === 0) log('system initialized — ready');
render();
</script>
